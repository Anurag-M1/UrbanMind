name: Deploy Backend To Render

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "render.yaml"
      - ".github/workflows/deploy-render.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy Hook
        run: curl --fail --silent --show-error --request POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
